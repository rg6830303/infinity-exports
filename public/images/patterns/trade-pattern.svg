<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300" fill="none">
  <!-- Light trade-route motif: dotted globe grid + arcing lanes. Used as a
       subtle background image on feature cards; inherits card tint via low
       opacity so it stays quiet under text. -->
  <g stroke="#0e1844" stroke-opacity="0.10">
    <path d="M0 60 Q210 20 420 60" />
    <path d="M0 120 Q210 80 420 120" />
    <path d="M0 180 Q210 140 420 180" />
    <path d="M0 240 Q210 200 420 240" />
    <path d="M70 0 Q90 150 70 300" />
    <path d="M170 0 Q190 150 170 300" />
    <path d="M270 0 Q290 150 270 300" />
    <path d="M370 0 Q390 150 370 300" />
  </g>
  <g fill="#0e1844" fill-opacity="0.14">
    <circle cx="70" cy="60" r="2.2"/><circle cx="170" cy="46" r="2.2"/>
    <circle cx="270" cy="46" r="2.2"/><circle cx="370" cy="60" r="2.2"/>
    <circle cx="90" cy="122" r="2.2"/><circle cx="185" cy="104" r="2.2"/>
    <circle cx="285" cy="104" r="2.2"/><circle cx="385" cy="122" r="2.2"/>
    <circle cx="85" cy="182" r="2.2"/><circle cx="182" cy="164" r="2.2"/>
    <circle cx="282" cy="164" r="2.2"/><circle cx="382" cy="182" r="2.2"/>
    <circle cx="72" cy="242" r="2.2"/><circle cx="172" cy="224" r="2.2"/>
    <circle cx="272" cy="224" r="2.2"/><circle cx="372" cy="242" r="2.2"/>
  </g>
  <g stroke="#0e1844" stroke-opacity="0.16" stroke-dasharray="3 5">
    <path d="M70 60 Q170 -10 270 46" />
    <path d="M90 122 Q230 60 385 122" />
    <path d="M85 182 Q240 120 372 242" />
  </g>
</svg>
